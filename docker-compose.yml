services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: planpipe
      POSTGRES_USER: planpipe
      POSTGRES_PASSWORD: planpipe
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planpipe"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=planpipe;Username=planpipe;Password=planpipe"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
